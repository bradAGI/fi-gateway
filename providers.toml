[[provider]]
name = "openrouter"
key_env = "OPENROUTER_API_KEY"
litellm_prefix = "openrouter"
discovery = "openrouter_free"
# All free OpenRouter models are auto-discovered from
# https://openrouter.ai/api/v1/models (filtered to pricing.prompt == 0).
# Cached 24h in ~/.config/free-inference/.discovery-cache.json.
# Run `./fi sync` to refresh on demand. Manual [[provider.model]] blocks
# can still be added below — they merge with the discovered list.

# ---

[[provider]]
name = "cerebras"
key_env = "CEREBRAS_API_KEY"
litellm_prefix = "cerebras"

[[provider.model]]
alias = "llama-3.3-70b-cerebras"
upstream = "llama-3.3-70b"
rpm = 30
groups = ["fast", "smart"]

[[provider.model]]
alias = "qwen3-235b-cerebras"
upstream = "qwen-3-235b-a22b"
rpm = 30
groups = ["smart"]

