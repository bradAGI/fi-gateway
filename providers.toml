# fi catalog — single source of truth for which providers/models exist.
# Adding a provider = appending a [[provider]] block here, then `fi reload`.
#
# Each [[provider]] declares how to authenticate. Each [[provider.model]]
# declares one upstream model and which fi groups it belongs to (fast/smart/
# vision/embed/rerank/code). Groups become alias model names like "fast" that
# the router picks under-quota deployments for at request time.

# ---------------------------------------------------------------------------
# Tier 1: truly free providers
# ---------------------------------------------------------------------------

[[provider]]
name = "gemini"
key_env = "GEMINI_API_KEY"
litellm_prefix = "gemini"

[[provider.model]]
alias = "gemini-2.5-pro"
upstream = "gemini-2.5-pro"
rpm = 1000
tpm = 5_000_000
groups = ["smart", "vision"]

[[provider.model]]
alias = "gemini-2.5-flash"
upstream = "gemini-2.5-flash"
rpm = 2000
tpm = 3_000_000
groups = ["fast", "vision", "default"]

[[provider.model]]
alias = "gemini-2.5-flash-lite"
upstream = "gemini-2.5-flash-lite"
rpm = 10000
tpm = 10_000_000
groups = ["fast", "cheap"]

[[provider.model]]
alias = "gemini-embedding-2"
upstream = "gemini-embedding-2"
rpm = 5000
tpm = 5_000_000
groups = ["embed"]

