# ---

[[provider]]
name = "nvidia"
key_env = "NVIDIA_API_KEY"
litellm_prefix = "nvidia_nim"
discovery = "nvidia_nim"
# All NVIDIA NIM endpoints (~135 models) auto-discovered via /v1/models.
# Free signup credits (1k–5k) cover all of them. Run `./fi sync` to refresh.
# Uses LiteLLM's dedicated nvidia_nim prefix so /v1/messages translates
# correctly (the openai prefix routes /v1/messages through OpenAI's new
# Responses API which NVIDIA doesn't expose).

