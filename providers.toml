[[provider]]
name = "huggingface"
key_env = "HF_TOKEN"
litellm_prefix = "huggingface"
discovery = "huggingface_inference"
# Auto-discovered from huggingface.co/api/models filtered to free
# inference_provider=hf-inference, text-generation only, limit 200.
# Add manual entries below for paid HF inference providers (Together,
# Fireworks, etc. via HF routing) if desired.

