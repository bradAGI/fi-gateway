services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: fi-litellm
    restart: unless-stopped
    ports:
      - "${FI_PORT:-4000}:4000"
    env_file:
      - ${FI_HOME}/keys.env
    volumes:
      - ${FI_HOME}/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/liveliness"]
      interval: 10s
      timeout: 3s
      retries: 5
