services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: infer-litellm
    restart: unless-stopped
    ports:
      - "${INFER_PORT:-4000}:4000"
    env_file:
      - ${INFER_HOME}/keys.env
    volumes:
      - ${INFER_HOME}/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    healthcheck:
      # The litellm image is python:slim — no wget/curl. Use the Python
      # interpreter that's guaranteed to be present.
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:4000/health/liveliness\",timeout=2).status==200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
